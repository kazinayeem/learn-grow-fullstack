server {
    listen 80;
    listen [::]:80;
    server_name learnandgrow.io;

    client_max_body_size 50m;

    # API requests are forwarded to the backend on port 5000.
    location = /api {
        proxy_pass http://127.0.0.1:5000/api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Branded fallback page for non-API 404/5xx responses.
    error_page 404 500 502 503 504 /_learn_grow_notice.html;

    location = /_learn_grow_notice.html {
        root /var/www/learn-grow-errors;
        internal;
        default_type text/html;
        add_header Cache-Control "no-store";
    }

    # Frontend app is served from Next.js on port 3000.
    location / {
        proxy_intercept_errors on;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
