# ================================
# CLEAN & SAFE NGINX CONFIG
# ================================

# Cache
proxy_cache_path /var/cache/nginx/production levels=1:2 keys_zone=BACKEND:10m max_size=30m inactive=1h use_temp_path=off;
proxy_cache_path /var/cache/nginx/static levels=1:2 keys_zone=STATIC:5m max_size=10m inactive=24h use_temp_path=off;

limit_req_zone $binary_remote_addr zone=general_limit:10m rate=50r/s;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

# Upstreams
upstream next_backend {
  least_conn;
  server 127.0.0.1:3000;
}

upstream backend_api {
  least_conn;
  server 127.0.0.1:5000;
}

server {
  listen 80;
  listen [::]:80;
  server_name learnandgrow.io;

  client_max_body_size 50m;

  # ✅ GZIP (FIXED)
  gzip on;
  gzip_vary on;
  gzip_min_length 1000;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml+rss image/svg+xml;
  gzip_comp_level 6;

  # ❌ BROTLI REMOVED (no module)

  # ================= FRONTEND =================
  location / {
    proxy_pass http://next_backend;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  # ================= BACKEND =================
  location ^~ /api/ {
    proxy_pass http://backend_api;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /api {
    proxy_pass http://backend_api/api;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # ================= ERROR =================
  error_page 404 500 502 503 504 /error.html;

  location = /error.html {
    root /var/www/learn-grow-errors;
    internal;
  }
}
