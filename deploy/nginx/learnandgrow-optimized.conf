# Learn & Grow - High-Performance Nginx Configuration
# Optimized for 1-2GB RAM VPS with 500 concurrent users
# Features: Caching, Compression, Rate Limiting, Security

# ========================================
# CACHE SETUP (30MB total, aggressive eviction)
# ========================================
proxy_cache_path /var/cache/nginx/production 
  levels=1:2 
  keys_zone=BACKEND:10m 
  max_size=30m 
  inactive=1h 
  use_temp_path=off;

proxy_cache_path /var/cache/nginx/static 
  levels=1:2 
  keys_zone=STATIC:5m 
  max_size=10m 
  inactive=24h 
  use_temp_path=off;

# Rate limiting: 50 requests/sec per IP, burst of 100
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=50r/s;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

# ========================================
# UPSTREAM SERVERS (Cluster Mode)
# ========================================
upstream next_backend {
  least_conn;  # Better load balancing for varying response times
  server 127.0.0.1:3000 max_fails=2 fail_timeout=10s;
  server 127.0.0.1:3001 max_fails=2 fail_timeout=10s;
  server 127.0.0.1:3002 max_fails=2 fail_timeout=10s;
  server 127.0.0.1:3003 max_fails=2 fail_timeout=10s;
  keepalive 32;
}

upstream backend_api {
  least_conn;
  server 127.0.0.1:5000 max_fails=2 fail_timeout=10s;
  keepalive 16;
}

# ========================================
# MAIN SERVER CONFIGURATION
# ========================================
server {
  listen 80;
  listen [::]:80;
  server_name learnandgrow.io www.learnandgrow.io;

  # Redirect HTTP to HTTPS (uncomment when SSL is ready)
  # return 301 https://$server_name$request_uri;
  
  # Client limits
  client_max_body_size 50m;
  client_body_timeout 30s;
  client_header_timeout 30s;
  send_timeout 30s;
  
  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_min_length 1000;  # Only compress responses > 1KB
  gzip_types 
    text/plain 
    text/css 
    text/xml 
    text/javascript 
    application/json 
    application/javascript 
    application/xml+rss 
    application/atom+xml 
    image/svg+xml
    application/x-font-ttf
    application/x-font-opentype
    application/vnd.ms-fontobject
    font/eot
    font/otf
    font/ttf;
  gzip_level 6;  # Balance: 6 is good for speed vs compression (1-9)
  gzip_buffers 16 8k;
  gzip_http_version 1.1;

  # Brotli compression (if compiled in nginx)
  brotli on;
  brotli_comp_level 6;
  brotli_min_length 1000;
  brotli_types 
    text/plain 
    text/css 
    text/xml 
    text/javascript 
    application/json 
    application/javascript 
    application/xml+rss 
    image/svg+xml
    font/eot
    font/otf
    font/ttf;

  # ========================================
  # LOGGING (minimize disk I/O)
  # ========================================
  access_log /var/log/nginx/learnandgrow_access.log combined buffer=32k flush=5s;
  error_log /var/log/nginx/learnandgrow_error.log warn;

  # ========================================
  # STATIC ASSETS (Images, Fonts, CSS, JS)
  # ========================================
  location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot|otf)$ {
    alias /var/www/learn-grow/public$uri;
    
    # Long-term caching for static assets
    expires 30d;
    add_header Cache-Control "public, immutable, max-age=2592000";
    
    # Enable browser cache revalidation (HTTP 304)
    add_header ETag "\"$file_mtime-$file_size\"";
    if_modified_since exact;
    
    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    
    access_log off;
  }

  # CSS and JavaScript with aggressive caching
  location ~* \.(css|js)$ {
    alias /var/www/learn-grow/public$uri;
    
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
    add_header X-Content-Type-Options "nosniff" always;
    
    access_log off;
  }

  # ========================================
  # FRONTEND (Next.js SSR with Caching)
  # ========================================
  location / {
    limit_req zone=general_limit burst=100 nodelay;
    
    # Proxy configuration
    proxy_pass http://next_backend;
    proxy_http_version 1.1;
    
    # Headers for connectivity
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $server_name;
    proxy_set_header Connection "";
    
    # WebSocket support (for future real-time features)
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    
    # Timeouts
    proxy_connect_timeout 10s;
    proxy_send_timeout 15s;
    proxy_read_timeout 15s;
    
    # Caching: Cache successful GET responses for 1 hour
    # Don't cache if Set-Cookie header is present (user-specific content)
    proxy_cache BACKEND;
    proxy_cache_valid 200 1h;
    proxy_cache_valid 404 5m;
    proxy_cache_bypass $cookie_nocache $arg_nocache;
    proxy_no_cache $http_pragma $http_authorization;
    
    # Cache lock: prevent thundering herd
    proxy_cache_lock on;
    proxy_cache_lock_timeout 5s;
    proxy_cache_lock_age 10s;
    
    # Show cache status
    add_header X-Cache-Status $upstream_cache_status;
    add_header Age $upstream_http_age;
  }

  # ========================================
  # API ENDPOINTS (Backend)
  # ========================================
  location /api/ {
    limit_req zone=api_limit burst=50 nodelay;
    
    proxy_pass http://backend_api/api/;
    proxy_http_version 1.1;
    
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    
    # API timeout (longer for data-intensive operations)
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
    
    # Cache GET requests only (50 requests/min per endpoint)
    proxy_cache BACKEND;
    proxy_cache_valid 200 5m;
    proxy_cache_methods GET HEAD;
    proxy_cache_key "$scheme$request_method$host$request_uri$cookie_user";
    proxy_cache_bypass $http_pragma $http_authorization;
    
    add_header X-Cache-Status $upstream_cache_status;
  }

  # Health check endpoint (not cached)
  location /api/health {
    proxy_pass http://backend_api/api/health;
    proxy_cache off;
    access_log off;
  }

  # Normalize /api without trailing slash
  location = /api {
    return 301 /api/;
  }

  # ========================================
  # ERROR PAGES & FALLBACK
  # ========================================
  error_page 502 503 504 /_errors/maintenance.html;
  error_page 404 /_errors/not-found.html;

  location = /_errors/maintenance.html {
    root /var/www/learn-grow-errors;
    internal;
    default_type text/html;
    add_header Cache-Control "no-store";
  }

  location = /_errors/not-found.html {
    root /var/www/learn-grow-errors;
    internal;
    default_type text/html;
    add_header Cache-Control "public, max-age=3600";
  }

  # ========================================
  # SECURITY HEADERS
  # ========================================
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), accelerometer=()" always;

  # ========================================
  # PERFORMANCE MONITORING
  # ========================================
  location /nginx_status {
    stub_status;
    access_log off;
    allow 127.0.0.1;
    deny all;
  }
}

