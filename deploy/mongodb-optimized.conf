# MongoDB Production Optimization
# Add to /etc/mongod.conf

# ========================================
# STORAGE ENGINE (WiredTiger - Default)
# ========================================
storage:
  engine: wiredTiger
  
  wiredTiger:
    # Cache size: Use 50% of available RAM (but max 50% of available memory)
    # For 1GB RAM: 256-384MB, For 2GB RAM: 512-768MB
    cacheSizeGB: 0.5
    
    # Compression
    compressor: snappy  # Or zstd for better compression (newer versions)
    
    # Journaling
    journalCompressor: snappy
    
    # Max connections per cache
    evictionMaxCacheSizeGB: 0.5

  # Journal settings
  journal:
    enabled: true
    commitIntervalMs: 100

# ========================================
# NETWORK & CONNECTION LIMITS
# ========================================
net:
  port: 27017
  bindIp: 127.0.0.1,::1
  
  # Connection pool settings
  maxIncomingConnections: 100
  wireObjectCheck: true
  
  # TCP settings for better performance
  tcpFastOpen: true

# ========================================
# SECURITY
# ========================================
security:
  authorization: enabled

# ========================================
# REPLICATION (Optional - for backup)
# ========================================
# replication:
#   replSetName: "rs0"

# ========================================
# LOGGING
# ========================================
systemLog:
  destination: file
  path: "/var/log/mongodb/mongod.log"
  logAppend: true
  logRotate: reopen
  
  # Log level (0=informational, 1=warning, 2=error, 5=debug)
  verbosity: 0

# ========================================
# PERFORMANCE & INDEXING
# ========================================
operationProfiling:
  mode: "slowOp"
  slowOpThresholdMs: 1000  # Log queries slower than 1 second

# Use memory efficiently
setParameter:
  # Control synchronous commits
  journalCommitInterval: 100
  
  # TTL monitor interval (in seconds)
  ttlMonitorSleepSecs: 60
  
  # Cache size percentage
  wiredTigerCacheSizeGB: 0.5
