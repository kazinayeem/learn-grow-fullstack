name: Deploy (Manual)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Copy files to VPS
        run: |
          scp -r grow-backend root@${{ secrets.VPS_HOST }}:/root/learn-grow-fullstack/
          scp -r learn-grow root@${{ secrets.VPS_HOST }}:/root/learn-grow-fullstack/
          scp -r deploy root@${{ secrets.VPS_HOST }}:/root/learn-grow-fullstack/
          scp -r scripts root@${{ secrets.VPS_HOST }}:/root/learn-grow-fullstack/
          scp ecosystem.config.js root@${{ secrets.VPS_HOST }}:/root/learn-grow-fullstack/
          scp QUICKSTART_DEPLOYMENT.md root@${{ secrets.VPS_HOST }}:/root/learn-grow-fullstack/

      - name: Restart services on VPS (Optimized)
        run: |
          ssh root@${{ secrets.VPS_HOST }} << 'EOF'

          set -e
          cd /root/learn-grow-fullstack

          echo "🚀 Starting optimized manual deployment..."

          # ======== NGINX SETUP ========
          echo "🌐 Setting up optimized Nginx..."
          if ! command -v nginx >/dev/null 2>&1; then
            apt-get update
            apt-get install -y nginx
          fi

          # Create cache directories for Nginx proxy caching
          mkdir -p /var/cache/nginx/production
          mkdir -p /var/cache/nginx/static
          mkdir -p /var/www/learn-grow-errors
          chmod -R 755 /var/cache/nginx
          chmod -R 755 /var/www/learn-grow-errors

          # Deploy optimized Nginx config
          cp deploy/nginx/learnandgrow-optimized.conf /etc/nginx/sites-available/learn-grow
          rm -f /etc/nginx/sites-enabled/learn-grow 2>/dev/null || true
          ln -sf /etc/nginx/sites-available/learn-grow /etc/nginx/sites-enabled/learn-grow
          nginx -t && systemctl reload nginx

          # ======== MONGODB OPTIMIZATION ========
          echo "⚙️ Optimizing MongoDB..."
          if command -v mongod >/dev/null 2>&1; then
            systemctl stop mongodb || true
            [ -f deploy/mongodb-optimized.conf ] && cp deploy/mongodb-optimized.conf /etc/mongod.conf
            chown mongodb:mongodb /etc/mongod.conf 2>/dev/null || true
            systemctl start mongodb
          fi

          # ======== BACKEND BUILD ========
          echo "📦 Building backend..."
          cd grow-backend
          npm install --prefer-offline
          npm run build
          cd ..

          # ======== FRONTEND BUILD ========
          echo "📦 Building frontend..."
          cd learn-grow
          npm install --prefer-offline
          npm run build
          cd ..

          # ======== PM2 CLUSTER DEPLOYMENT ========
          echo "🔄 Deploying PM2 cluster mode..."
          pm2 delete ecosystem.config.js 2>/dev/null || true
          sleep 1
          pm2 start ecosystem.config.js
          pm2 save

          # ======== VERIFICATION ========
          echo "✅ Verifying services..."
          sleep 2
          pm2 status
          nginx -t
          systemctl is-active nginx && echo "✓ nginx: active" || echo "✗ nginx: inactive"
          systemctl is-active mongodb && echo "✓ mongodb: active" || echo "✗ mongodb: inactive"

          echo ""
          echo "✅ Optimized deployment completed!"
          echo "📊 Monitor with: ./deploy/monitor.sh"

          EOF
