name: Deploy Learn & Grow Fullstack (root)

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no root@${{ secrets.VPS_HOST }} << 'EOF'

            set -ex

            echo "🚀 Starting deployment..."

            # Clone if first time
            if [ ! -d "/root/learn-grow-fullstack" ]; then
              git clone https://github.com/kazinayeem/learn-grow-fullstack.git /root/learn-grow-fullstack
            fi

            cd /root/learn-grow-fullstack

            echo "🧹 Cleaning repo"
            git fetch origin
            git reset --hard origin/main
            git clean -fd

            # ================= BACKEND =================
            echo "📦 Building backend..."
            cd grow-backend

            rm -rf node_modules
            rm -rf dist

            npm ci
            npm run build

            cd ..

            # ================= FRONTEND =================
            echo "📦 Building frontend..."
            cd learn-grow

            rm -rf node_modules
            rm -rf dist
            rm -rf build

            npm ci
            npm run build

            cd ..

            # ================= PM2 =================
            echo "🔄 Restarting PM2 (fresh deploy)..."

            pm2 delete all || true
            pm2 start ecosystem.config.js --update-env
            pm2 save

            # ================= NGINX =================
            echo "🌐 Reloading nginx..."
            nginx -t && systemctl reload nginx

            # ================= VERIFY =================
            echo "✅ Checking services..."
            pm2 status
            echo "🌐 nginx: $(systemctl is-active nginx)"

            echo "✅ Deployment completed successfully!"

          EOF

