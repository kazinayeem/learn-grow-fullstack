name: Deploy Learn & Grow Fullstack (root)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no root@${{ secrets.VPS_HOST }} << 'EOF'

            set -e

            echo "🚀 Starting optimized deployment..."

            if [ ! -d "/root/learn-grow-fullstack" ]; then
              echo "📥 Cloning repository..."
              git clone https://github.com/kazinayeem/learn-grow-fullstack.git /root/learn-grow-fullstack
            fi

            cd /root/learn-grow-fullstack

            echo "🧹 Cleaning repo"
            git reset --hard
            git clean -fd

            echo "🔄 Pulling latest code"
            git pull origin main

            # ======== NGINX SETUP ========
            echo "🌐 Setting up optimized Nginx..."
            if ! command -v nginx >/dev/null 2>&1; then
              apt-get update
              apt-get install -y nginx
            fi

            # Create cache directories for Nginx proxy caching
            mkdir -p /var/cache/nginx/production
            mkdir -p /var/cache/nginx/static
            mkdir -p /var/www/learn-grow-errors
            chmod -R 755 /var/cache/nginx
            chmod -R 755 /var/www/learn-grow-errors

            # Deploy optimized Nginx config
            cp deploy/nginx/learnandgrow-optimized.conf /etc/nginx/sites-available/learn-grow
            rm -f /etc/nginx/sites-enabled/learn-grow
            ln -sf /etc/nginx/sites-available/learn-grow /etc/nginx/sites-enabled/learn-grow
            nginx -t && systemctl reload nginx

            # ======== MONGODB OPTIMIZATION ========
            echo "⚙️ Optimizing MongoDB..."
            if command -v mongod >/dev/null 2>&1; then
              systemctl stop mongodb || true
              cp deploy/mongodb-optimized.conf /etc/mongod.conf
              chown mongodb:mongodb /etc/mongod.conf
              systemctl start mongodb
            fi

            # ======== BACKEND BUILD ========
            echo "📦 Building backend..."
            cd grow-backend
            npm install --prefer-offline
            npm run build
            cd ..

            # ======== FRONTEND BUILD ========
            echo "📦 Building frontend..."
            cd learn-grow
            npm install --prefer-offline
            npm run build
            cd ..

            # ======== PM2 CLUSTER DEPLOYMENT ========
            echo "🔄 Deploying PM2 cluster mode (4 instances)..."
            pm2 delete ecosystem.config.js 2>/dev/null || true
            pm2 start ecosystem.config.js
            pm2 save

            # ======== VERIFICATION ========
            echo "✅ Verifying services..."
            pm2 status
            nginx -t
            echo "🌐 nginx: $(systemctl is-active nginx)"
            echo "💾 mongodb: $(systemctl is-active mongodb)"

            

          EOF