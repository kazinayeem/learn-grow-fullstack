name: Deploy Learn & Grow Fullstack (root)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no root@${{ secrets.VPS_HOST }} << 'EOF'

            set -e

            echo "🚀 Starting optimized deployment..."

            if [ ! -d "/root/learn-grow-fullstack" ]; then
              echo "📥 Cloning repository..."
              git clone https://github.com/kazinayeem/learn-grow-fullstack.git /root/learn-grow-fullstack
            fi

            cd /root/learn-grow-fullstack

            echo "🧹 Cleaning repo"
            git reset --hard
            git clean -fd

            echo "🔄 Pulling latest code"
            git pull origin main

            # ======== NGINX SETUP ========
            echo "🌐 Setting up optimized Nginx..."
            if ! command -v nginx >/dev/null 2>&1; then
              apt-get update
              apt-get install -y nginx
            fi

            # Create cache directories for Nginx proxy caching
            mkdir -p /var/cache/nginx/production
            mkdir -p /var/cache/nginx/static
            mkdir -p /var/www/learn-grow-errors
            chmod -R 755 /var/cache/nginx
            chmod -R 755 /var/www/learn-grow-errors

            # Deploy optimized Nginx config
            cp deploy/nginx/learnandgrow-optimized.conf /etc/nginx/sites-available/learn-grow

            # Remove default and any conflicting enabled site links.
            rm -f /etc/nginx/sites-enabled/default
            find /etc/nginx/sites-enabled -mindepth 1 -maxdepth 1 ! -name "learn-grow" -exec rm -f {} \; || true

            # Disable conflicting server blocks for learnandgrow.io outside our managed file.
            for conf in /etc/nginx/sites-enabled/* /etc/nginx/conf.d/*.conf; do
              [ -e "$conf" ] || continue
              if [ "$conf" = "/etc/nginx/sites-enabled/learn-grow" ]; then
                continue
              fi

              if grep -qiE "server_name[[:space:]].*learnandgrow\.io" "$conf"; then
                echo "⚠️ Disabling conflicting nginx config: $conf"
                mv "$conf" "${conf}.disabled-by-deploy" || true
              fi
            done

            rm -f /etc/nginx/sites-enabled/learn-grow
            ln -sf /etc/nginx/sites-available/learn-grow /etc/nginx/sites-enabled/learn-grow
            echo "📄 Enabled nginx sites:"
            ls -la /etc/nginx/sites-enabled || true
            echo "🔎 learnandgrow.io server_name declarations:"
            grep -RniE "server_name[[:space:]].*learnandgrow\.io" /etc/nginx/sites-enabled /etc/nginx/conf.d 2>/dev/null || true
            nginx -t && systemctl reload nginx

            # ======== MONGODB OPTIMIZATION ========
            echo "⚙️ Optimizing MongoDB..."
            if command -v mongod >/dev/null 2>&1; then
              systemctl stop mongodb || true
              cp deploy/mongodb-optimized.conf /etc/mongod.conf
              chown mongodb:mongodb /etc/mongod.conf
              systemctl start mongodb
            fi

            # ======== BACKEND BUILD ========
            echo "📦 Building backend..."
            cd grow-backend
            npm install --prefer-offline
            npm run build
            cd ..

            # ======== FRONTEND BUILD ========
            echo "📦 Building frontend..."
            cd learn-grow
            npm install --prefer-offline
            npm run build
            cd ..

            # ======== PM2 CLUSTER DEPLOYMENT ========
            echo "🔄 Deploying PM2 cluster mode (4 instances)..."
            pm2 delete ecosystem.config.js 2>/dev/null || true
            pm2 start ecosystem.config.js
            pm2 save

            # ======== VERIFICATION ========
            echo "✅ Verifying services..."
            pm2 status
            nginx -t
            echo "🌐 nginx: $(systemctl is-active nginx)"
            echo "💾 mongodb: $(systemctl is-active mongodb)"

            echo "🧪 Running API smoke checks..."
            BACKEND_API_STATUS=$(curl --retry 10 --retry-delay 2 --retry-connrefused -s -o /tmp/backend_api_check.out -w "%{http_code}" "http://127.0.0.1:5000/api" || echo "000")
            if [ "$BACKEND_API_STATUS" -lt 200 ] || [ "$BACKEND_API_STATUS" -ge 400 ]; then
              echo "❌ Backend API health failed: HTTP $BACKEND_API_STATUS"
              cat /tmp/backend_api_check.out || true
              exit 1
            fi

            NGINX_COMBO_STATUS=$(curl --retry 10 --retry-delay 2 --retry-connrefused -s -o /tmp/nginx_combo_check.out -w "%{http_code}" -H "Host: learnandgrow.io" "http://127.0.0.1/api/combo/list?page=1&limit=1" || echo "000")
            if [ "$NGINX_COMBO_STATUS" -lt 200 ] || [ "$NGINX_COMBO_STATUS" -ge 400 ]; then
              echo "❌ Nginx /api combo check failed: HTTP $NGINX_COMBO_STATUS"
              cat /tmp/nginx_combo_check.out || true
              exit 1
            fi

            if grep -qi "<!DOCTYPE html>" /tmp/nginx_combo_check.out; then
              echo "❌ Nginx /api combo check returned HTML (likely frontend fallback), expected backend JSON"
              head -n 20 /tmp/nginx_combo_check.out || true
              exit 1
            fi

            NGINX_GUESTS_STATUS=$(curl --retry 10 --retry-delay 2 --retry-connrefused -s -o /tmp/nginx_guests_check.out -w "%{http_code}" -H "Host: learnandgrow.io" "http://127.0.0.1/api/events/guests/list?page=1&limit=1" || echo "000")
            if [ "$NGINX_GUESTS_STATUS" -lt 200 ] || [ "$NGINX_GUESTS_STATUS" -ge 400 ]; then
              echo "❌ Nginx /api guests check failed: HTTP $NGINX_GUESTS_STATUS"
              cat /tmp/nginx_guests_check.out || true
              exit 1
            fi

            if grep -qi "<!DOCTYPE html>" /tmp/nginx_guests_check.out; then
              echo "❌ Nginx /api guests check returned HTML (likely frontend fallback), expected backend JSON"
              head -n 20 /tmp/nginx_guests_check.out || true
              exit 1
            fi

            

          EOF