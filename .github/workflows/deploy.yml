name: Deploy Learn & Grow Fullstack (root)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no root@${{ secrets.VPS_HOST }} << 'EOF'

            set -e

            echo "🚀 Starting deployment..."

            if [ ! -d "/root/learn-grow-fullstack" ]; then
              echo "📥 Cloning repository..."
              git clone https://github.com/kazinayeem/learn-grow-fullstack.git /root/learn-grow-fullstack
            fi

            cd /root/learn-grow-fullstack

            echo "🧹 Cleaning repo"
            git reset --hard
            git clean -fd

            echo "🔄 Pulling latest code"
            git pull origin main

            echo "📦 Backend build"
            cd grow-backend
            npm install --prefer-offline
            npm run build

            echo "♻️ Backend PM2"
            pm2 describe grow-backend > /dev/null \
              && pm2 reload grow-backend \
              || pm2 start npm --name grow-backend -- start

            echo "📦 Frontend build"
            cd ../learn-grow
            npm install --prefer-offline
            npm run build

            echo "♻️ Frontend PM2"
            pm2 describe frontend > /dev/null \
              && pm2 reload frontend \
              || pm2 start npm --name frontend -- start

            echo "💾 Saving PM2"
            pm2 save

            echo "✅ Deployment completed"

          EOF