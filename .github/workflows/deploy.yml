name: Build & Deploy Learn Grow

on:
  push:
    branches: [ main ]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      ############################
      # Backend build
      ############################

      - name: Install backend deps
        run: |
          cd grow-backend
          npm install

      - name: Build backend
        run: |
          cd grow-backend
          npm run build || echo "No backend build"

      ############################
      # Frontend build
      ############################

      - name: Install frontend deps
        run: |
          cd learn-grow
          npm install

      - name: Build frontend
        run: |
          cd learn-grow
          npm run build

      ############################

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: |
            grow-backend
            learn-grow

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-files

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          scp -r grow-backend root@${{ secrets.VPS_HOST }}:/root/learn-grow-fullstack/
          scp -r learn-grow root@${{ secrets.VPS_HOST }}:/root/learn-grow-fullstack/

          ssh root@${{ secrets.VPS_HOST }} << 'EOF'

          cd /root/learn-grow-fullstack

          echo "Restart backend"
          pm2 delete grow-backend 2>/dev/null || true
          cd grow-backend
          npm install --production
          pm2 start npm --name grow-backend -- start

          echo "Restart frontend"
          cd ../learn-grow
          pm2 delete frontend 2>/dev/null || true
          pm2 start npm --name frontend -- start

          pm2 save

          echo "Deploy finished"

          EOF